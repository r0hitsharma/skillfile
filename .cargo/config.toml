[alias]
cov = "llvm-cov --workspace"
cov-html = "llvm-cov --workspace --html"
complexity = "clippy --workspace --all-targets -- -W clippy::cognitive_complexity -W clippy::too_many_lines -W clippy::excessive_nesting"
complexity-json = "clippy --workspace --all-targets --message-format=json -- -W clippy::cognitive_complexity -W clippy::too_many_lines -W clippy::excessive_nesting"
lint-strict = "clippy --workspace --all-targets -- -W clippy::pedantic -W clippy::cognitive_complexity -W clippy::too_many_lines -W clippy::excessive_nesting"
check-deps = "deny check"
check-unused = "machete"
