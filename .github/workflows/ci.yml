name: CI

on:
  pull_request:
    branches: [master]
  workflow_call:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  check:
    name: Static checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Check dependencies
        run: cargo deny check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Install cargo-machete
        uses: taiki-e/install-action@cargo-machete
      - name: Check unused dependencies
        run: cargo machete


  test-linux:
    name: Tests (Linux, with coverage)
    needs: [check]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # Functional tests (tests/cli.rs) spawn `target/debug/skillfile` as a
      # child process. `cargo test` does NOT produce this executable - it only
      # builds test harnesses (target/debug/deps/skillfile-<hash>). Without
      # this step, the tests find a stale executable left in the CI cache.
      # The cache is keyed on Cargo.lock (not source hash), so the old binary
      # survives across commits that don't change dependencies.
      # `-p skillfile` builds the CLI crate and all its deps (core, sources,
      # deploy) into the final executable. The only crate it skips is the
      # test runner itself, which `cargo test` builds in the next step.
      - name: Build binary for functional tests
        run: cargo build -p skillfile

      - name: Tests with coverage
        env:
          GITHUB_TOKEN: ${{ secrets.FUNCTIONAL_TESTS_GITHUB_TOKEN }}
        run: cargo llvm-cov --workspace --html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/llvm-cov/html/

  test-macos:
    name: Tests (macOS)
    needs: [check]
    runs-on: macos-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # See the Ubuntu job comment for the full explanation: `cargo test`
      # doesn't produce the skillfile executable, and the CI cache can
      # serve a stale one compiled from a previous commit's source code.
      - name: Build binary for functional tests
        run: cargo build -p skillfile

      - name: Tests
        env:
          GITHUB_TOKEN: ${{ secrets.FUNCTIONAL_TESTS_GITHUB_TOKEN }}
        run: cargo test --workspace

  fuzz:
    name: Fuzz parse_manifest
    needs: [check]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Cache fuzz corpus
        uses: actions/cache@v4
        with:
          path: fuzz/corpus/
          key: fuzz-corpus-${{ github.sha }}
          restore-keys: fuzz-corpus-

      - name: Run fuzzer
        run: cargo +nightly fuzz run parse_manifest -- -max_total_time=60

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts
          path: fuzz/artifacts/
