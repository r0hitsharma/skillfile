name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  verify-install:
    name: Verify install script (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Run install.sh against previous release
        env:
          SKILLFILE_INSTALL_DIR: ${{ runner.temp }}/skillfile-test
        run: sh install.sh

      - name: Verify binary runs
        run: |
          "${{ runner.temp }}/skillfile-test/skillfile" --version
          "${{ runner.temp }}/skillfile-test/skillfile" --help

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: [ci, verify-install]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: skillfile-x86_64-linux
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: skillfile-aarch64-linux
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: skillfile-x86_64-macos
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: skillfile-aarch64-macos
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux aarch64)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release binary
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package artifact
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/skillfile dist/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish crates to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p skillfile-core
          sleep 30
          cargo publish -p skillfile-sources
          sleep 30
          cargo publish -p skillfile-deploy
          sleep 30
          cargo publish -p skillfile

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, publish]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create checksums
        working-directory: dist
        run: sha256sum skillfile-* > checksums-sha256.txt

      - name: Extract changelog for this version
        id: changelog
        run: |
          # Extract the section between the first ## and the next ## (or EOF)
          VERSION="${GITHUB_REF_NAME#v}"
          awk '/^## v'"$VERSION"'/{found=1; next} found && /^## /{exit} found{print}' CHANGELOG.md > release-notes.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            dist/skillfile-*
            dist/checksums-sha256.txt
            install.sh
